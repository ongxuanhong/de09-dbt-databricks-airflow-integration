services:

  postgres:
    image: debezium/example-postgres:2.7.3.Final
    container_name: postgres
    volumes:
      - ./postgres/data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    env_file:
      - .env.docker

  schema-registry:
    image: confluentinc/cp-schema-registry:latest
    hostname: schema-registry
    container_name: schema-registry
    ports:
      - "8082:8082"
    depends_on:
      - kafka
    networks:
      - default
    env_file:
      - .env.docker
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8082/subjects"]
      interval: 30s
      timeout: 10s
      retries: 5

  debezium:
    image: debezium/connect:3.0.0.Final
    container_name: debezium
    ports:
      - "8083:8083"
    env_file:
      - .env.docker
    depends_on:
      - schema-registry
    volumes:
      - ./avro-converter:/kafka/connect/avro-converter
      - ./s3-connector:/kafka/connect/s3-connector

  kafka:
    image: confluentinc/cp-kafka:latest
    container_name: kafka
    ports:
      - "29092:29092"
      - "9092:9092"
    env_file:
      - .env.docker
    healthcheck:
      test: [ "CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092" ]
      interval: 10s
      timeout: 5s
      retries: 5 

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    platform: linux/arm64
    container_name: kafka-ui
    ports:
      - "8080:8080"
    depends_on:
      - kafka
    networks:
      - default
    env_file:
      - .env.docker

  minio:
    image: minio/minio
    container_name: minio
    ports:
      - "9000:9000"
      - "9001:9001"
    env_file:
      - .env.docker
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  bucket-setup:
    image: minio/mc
    container_name: bucket-setup
    env_file:
      - .env.docker
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      sleep 5 &&
      mc alias set myminio http://minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD} &&
      
      mc mb myminio/bronze || true &&
      mc anonymous set public myminio/bronze &&
      echo 'Bucket bronze ready.' && 
      
      mc mb myminio/silver || true &&
      mc anonymous set public myminio/silver &&
      echo 'Bucket silver ready.'

      mc mb myminio/gold || true &&
      mc anonymous set public myminio/gold &&
      echo 'Bucket gold ready.'
      "